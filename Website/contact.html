<!DOCTYPE html>
<html lang= "en">
  <head>
    <meta charset= "UTF-8">
    <meta name= "viewport" content= "width=device-width, initial-scale=1.0">
    <link rel= "stylesheet" href= "styles/styles.css">  

    <link rel= "preconnect" href= "https://fonts.googleapis.com">
    <link rel= "preconnect" href= "https://fonts.gstatic.com" crossorigin>
    <link href= "https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel= "stylesheet">
    
    <link rel= "icon" type= "image/x-icon" href= "images/pager-solid.png">
    <title>Contact</title>
  </head>
    <body>
      <header class= "floating-header">
        <div class= "header-left">
          <a href= "/index.html">Home</a>
        </div>
        <div class= "header-center">
          <nav class= "nav-links">
            <p>Contact</p>
          </nav>
        </div>
        <div class= "header-right">
          <a href= "staff.html">Staff</a>
          <a>Contact</a>
        </div>
      </header>
      <main>
        <br><br><br><br><br>
          <form action= "mailto:[email-address]?Subject=Contact" method= "post" enctype= "text/plain">
            <div class="form-row">
              <label for= "name">Name</label>
              <input class= "text-input" type= "text" id= "name" name= "name" placeholder= "Your name.."></input><br><br>
            </div>
            <div class="form-row">
              <label for= "email">Email</label>
              <input class= "text-input" type= "text" id= "email" name= "email" placeholder= "Enter your email address"><br><br><br>
            </div>
            <div class="form-row">
            <label class= "align-top-textarea" for= "subject">Subject</label>
            <textarea class= "content-left" id= "subject" name= "subject" placeholder= "Write something.." ></textarea><br><br>
            </div>
            
            <button class= "button-control" input type= "submit" value= "Send Email">Send Email</button>
            
          </form>
          
        <br><br>
      </main>
  </body>
