  <body>
    <header class= "floating-header">
      <div class= "header-left">

        <a>Contact</a>
      </div>
    </header>
    <main>
    <h1 class="centered-h1">Contact Us</h1>
    <div class="form-container">
      <form action="#" id="emailForm" method="POST">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" id="button" class="submit-btn">Send Message</button>
      </form>
    </div>
    <br>
    <br>
    <br>
      <p class="centered-p">Phone: XX XXXX XXXX</p>
    <br>
    <br>
      <p class="centered-p">Fax: XX XXXX XXXX</p>
    <br>
    <br>
    <script src="script.js"></script>
    </main>
    <footer class= "floating-footer">
